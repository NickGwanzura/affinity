<style>
      /* Prefer Carbon’s IBM Plex if available via package; otherwise fall back to system sans/mono */
      body { font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; }

      /* Accessibility: respect reduced-motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Carbon overrides for Tailwind compatibility */
      .cds--header ~ .cds--content {
        margin-top: 3rem;
      }

      /* Hide scrollbar for mobile tabs - cross-browser */
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      /* Touch manipulation for better mobile response */
      .touch-manipulation {
        touch-action: manipulation;
      }
    </style>
</head>
